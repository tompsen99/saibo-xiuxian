<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>赛博修仙</title>
  <link rel="stylesheet" href="css/xp-theme.css">
</head>
<body>

  <!-- Login/Register Overlay -->
  <div id="login-overlay" class="overlay">
    <div class="overlay-box auth-box">
      <h2 class="title-bar">赛博修仙</h2>
      
      <!-- Login Form -->
      <div id="login-form">
        <input type="email" id="login-email" placeholder="邮箱" class="xp-input">
        <input type="password" id="login-password" placeholder="密码" class="xp-input">
        <div id="login-error" class="error-text"></div>
        <button id="login-submit" class="xp-btn">登录</button>
        <div class="toggle-link">没有账号？<a id="show-register">立即注册</a></div>
      </div>
      
      <!-- Register Form -->
      <div id="register-form" class="hidden">
        <input type="email" id="reg-email" placeholder="邮箱" class="xp-input">
        <input type="password" id="reg-password" placeholder="密码" class="xp-input">
        <input type="text" id="reg-name" placeholder="角色名（2-12字）" class="xp-input">
        <div id="register-error" class="error-text"></div>
        <button id="register-submit" class="xp-btn">注册</button>
        <div class="toggle-link">已有账号？<a id="show-login">立即登录</a></div>
      </div>
    </div>
  </div>

  <!-- Profession Selection Overlay -->
  <div id="profession-overlay" class="overlay hidden">
    <div class="overlay-box profession-box">
      <h2 class="title-bar">选择你的前世职业</h2>
      <p class="subtitle">你在2030年的退休身份，将影响你的初始属性</p>
      <div id="profession-grid" class="profession-grid"></div>
      <button id="profession-confirm" class="xp-btn" disabled>下一步</button>
    </div>
  </div>

  <!-- Attribute Allocation Overlay -->
  <div id="attr-overlay" class="overlay hidden">
    <div class="overlay-box attr-box">
      <h2 class="title-bar">调整你的属性</h2>
      <p class="subtitle">总和必须为100，可点击随机重新分配</p>
      <div id="attr-controls"></div>
      <div id="attr-total" class="attr-total">总计: 100</div>
      <div class="attr-actions">
        <button id="attr-randomize" class="xp-btn">🎲 随机</button>
        <button id="attr-confirm" class="xp-btn">✓ 确认创建</button>
      </div>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="hidden">
    <div id="sidebar">
      <h3 id="player-name">穿越者</h3>
      <div id="status-bar">
        <p>境界: <span id="stat-realm">练气期</span></p>
        <p>等级: <span id="stat-level">1</span></p>
        <p>HP: <span id="stat-hp">100/100</span></p>
        <p>灵: <span id="stat-sp">50/50</span></p>
        <p>体: <span id="stat-st">100/100</span></p>
        <p>💎<span id="stat-silver">100</span></p>
      </div>
      <p id="current-location">📍 新手村-村口</p>
      <div id="side-panel">
        <button class="side-btn" data-cmd="/属性">📊</button>
        <button class="side-btn" data-cmd="/背包">🎒</button>
        <button class="side-btn" data-cmd="/装备">🛡️</button>
        <button class="side-btn" data-cmd="/丹药">💊</button>
        <button class="side-btn" data-cmd="/遗物">💎</button>
        <button class="side-btn" data-cmd="/移动 北">⬆️</button>
        <button class="side-btn" data-cmd="/移动 南">⬇️</button>
        <button class="side-btn" data-cmd="/移动 东">➡️</button>
        <button class="side-btn" data-cmd="/移动 西">⬅️</button>
        <button class="side-btn" data-cmd="/地图">🗺️</button>
        <button class="side-btn" data-cmd="/攻击">⚔️</button>
        <button class="side-btn" data-cmd="/挂机">🔄</button>
        <button class="side-btn" data-cmd="/打坐">🧘</button>
        <button class="side-btn" data-cmd="/功法">📖</button>
        <button class="side-btn" data-cmd="/任务">📋</button>
        <button class="side-btn" data-cmd="/商店">🏪</button>
        <button class="side-btn" data-cmd="/门派">🏛️</button>
        <button class="side-btn" data-cmd="/签到">📅</button>
        <button class="side-btn" data-cmd="/好友">👥</button>
        <button class="side-btn" data-cmd="/VIP">👑</button>
        <button class="side-btn" data-cmd="/Bug">🐛</button>
        <button class="side-btn" data-cmd="/手表">⌚</button>
        <button class="side-btn" data-cmd="/解谜">🧩</button>
        <button class="side-btn" data-cmd="/成就">🏆</button>
        <button class="side-btn" data-cmd="/排行榜">📊</button>
        <button class="side-btn" data-cmd="/组队">👥</button>
        <button class="side-btn" data-cmd="/交易">💰</button>
        <button class="side-btn" data-cmd="/帮助">❓</button>
      </div>
    </div>
    
    <div id="main">
      <div id="game-text"></div>
      <div id="input-area">
        <input type="text" id="chat-input" placeholder="输入命令或聊天内容..." autocomplete="off">
        <button id="send-btn" class="xp-btn">发送</button>
      </div>
    </div>
  </div>

  <script src="js/client.js"></script>
</body>
</html>
